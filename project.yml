name: Trailhead

# ── 工程生成配置（XcodeGen）────────────────────────────────────────────────
# 用法：在本目录执行 `xcodegen generate` 后 `open Trailhead.xcodeproj`。
# 单 application target 同时支持 macOS 与 iOS（共享 SwiftUI 代码，PDR T0.1）。

options:
  bundleIdPrefix: app.trailhead
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

# 纯逻辑层（Models/Stores/Services）拆成本地 Swift Package，便于 hostless 单测
packages:
  TrailheadCore:
    path: Packages/TrailheadCore

# 全工程通用构建设置
settings:
  base:
    SWIFT_VERSION: "5.0"              # 语言模式（"5.9" 非法，会导致工程打不开）
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_WARN_UNINITIALIZED_AUTOS: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO  # 允许 SwiftLint 构建期脚本读取源码

targets:
  Trailhead:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Trailhead
    dependencies:
      - package: TrailheadCore
    settings:
      base:
        PRODUCT_NAME: Trailhead
        PRODUCT_BUNDLE_IDENTIFIER: app.trailhead.Trailhead
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        # Info.plist 键（用生成式 plist，避免与物理文件冲突）
        INFOPLIST_KEY_CFBundleDisplayName: 行迹
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.travel
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    # 构建期跑 SwiftLint（未安装则仅提示，不阻断构建）
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --quiet --config "$SRCROOT/.swiftlint.yml"
          else
            echo "warning: 未安装 SwiftLint，跳过代码规范检查（brew install swiftlint，详见 docs/CODE_STYLE.md）"
          fi

  TrailheadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TrailheadTests
    dependencies:
      - target: Trailhead
      - package: TrailheadCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.trailhead.TrailheadTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Trailhead.app/Contents/MacOS/Trailhead"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Trailhead:
    build:
      targets:
        Trailhead: all
        TrailheadTests: [test]
    test:
      targets:
        - TrailheadTests
